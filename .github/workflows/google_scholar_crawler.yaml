name: Get Citation Data

on:
  page_build:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r google_scholar_crawler/requirements.txt
      - name: Fetch Google Scholar stats
        id: scholar
        continue-on-error: true
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: |
          if [ -z "${GOOGLE_SCHOLAR_ID}" ]; then
            echo "GOOGLE_SCHOLAR_ID secret is not configured; skipping crawl."
            exit 0
          fi
          cd google_scholar_crawler
          python3 main.py
      - name: Publish stats branch
        if: steps.scholar.outcome == 'success'
        run: |
          cd google_scholar_crawler/results
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.json
          git commit -m "Updated citation data"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:google-scholar-stats
